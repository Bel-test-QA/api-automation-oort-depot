name: Automated Postman Tests

on:
  workflow_dispatch:

jobs:
  test-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Newman and Reporters
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra
        npm install -g newman-reporter-allure
        npm install -g allure-commandline

    - name: Run Postman Tests
      run: |
        newman run collections/ultimate_api.postman_collection.json -e environments/qa_postman_environment.json -r cli,htmlextra,allure --reporter-allure-export allure-results
      continue-on-error: true

    - name: Upload htmlextra Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: postman-html-report
        path: newman/
        retention-days: 5

    - name: Build Allure Report Static HTML
      run: |
        allure generate allure-results --clean -o allure-report
      if: always()

    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
        retention-days: 5
